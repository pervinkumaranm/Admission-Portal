<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SSEC Admission Portal{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#7B66D9',
                        'primary-dark': '#6552C4',
                        'primary-light': '#9381E3',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 30px -5px rgba(123, 102, 217, 0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #7B66D9; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden text-gray-800">
    <!-- Decorative Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <!-- Small semicircle at bottom left corner -->
        <div class="absolute -bottom-16 -left-16 w-64 h-64 rounded-full bg-[#8A76E0]"></div>
        <!-- Small semicircle at top right corner -->
        <div class="absolute -top-16 -right-16 w-64 h-64 rounded-full bg-[#6C56CA]"></div>
    </div>

    <!-- Main Content wrapper -->
    <div class="relative z-10 w-full min-h-screen flex items-center justify-center p-5">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{% block title %}SSEC Admission Portal{% endblock %}</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#6C63FF',
              dark: '#5a52d5',
              light: '#7F7FD5'
            },
            background: '#F8F9FC',
            surface: '#FFFFFF'
          },
          boxShadow: {
            'soft': '0 4px 20px rgba(0, 0, 0, 0.03)',
            'floating': '0 10px 30px rgba(108, 99, 255, 0.15)',
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      background-color: #F8F9FC;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    /* Hide scrollbar for clean UI */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-left: 4px solid #10B981;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
    }
    .toast.show { transform: translateX(0); }
    .toast.error { border-left-color: #EF4444; }
  </style>
</head>
<body class="bg-background text-gray-800">

<!-- Mobile Header -->
<header class="md:hidden bg-white/80 backdrop-blur-md sticky top-0 z-40 px-5 py-4 flex items-center justify-between border-b border-gray-100 shadow-sm">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-light flex items-center justify-center text-white">
      <i class="fas fa-graduation-cap"></i>
    </div>
    <div>
      <h1 class="font-bold text-gray-900 leading-tight">SSEC Portal</h1>
      <p class="text-xs text-gray-500 font-medium">Staff Panel</p>
    </div>
  </div>
  <a href="{{ url_for('logout') }}" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors">
    <i class="fas fa-sign-out-alt"></i>
  </a>
</header>

<div class="flex h-screen overflow-hidden">
  
  <!-- Desktop Sidebar -->
  <aside class="hidden md:flex flex-col w-[280px] bg-white border-r border-gray-100 z-30 shadow-[4px_0_24px_rgba(0,0,0,0.02)] relative shrink-0">
    <div class="p-8 pb-4">
      <div class="flex items-center gap-4 mb-2">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-primary-light flex items-center justify-center text-white shadow-floating">
          <i class="fas fa-graduation-cap text-xl"></i>
        </div>
        <div>
          <h2 class="text-xl font-bold text-gray-900 tracking-tight">Admission</h2>
          <p class="text-[13px] text-gray-500 font-medium">Staff Portal</p>
        </div>
      </div>
    </div>

    <div class="px-5 flex-1 overflow-y-auto no-scrollbar py-6">
      <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 px-3">Menu</p>
      <nav class="space-y-1.5">
        <a href="{{ url_for('dashboard') }}" class="flex items-center gap-3.5 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.endpoint == 'dashboard' %}bg-primary/10 text-primary font-semibold{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
          <i class="fas fa-th-large {% if request.endpoint == 'dashboard' %}text-primary{% else %}text-gray-400 group-hover:text-primary{% endif %} transition-colors w-5 text-center text-[18px]"></i>
          <span class="text-[15px]">Dashboard</span>
        </a>
        
        <a href="{{ url_for('new_applicant') }}" class="flex items-center gap-3.5 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.endpoint == 'new_applicant' or request.endpoint == 'edit_applicant' %}bg-primary/10 text-primary font-semibold{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
          <i class="fas fa-user-plus {% if request.endpoint == 'new_applicant' or request.endpoint == 'edit_applicant' %}text-primary{% else %}text-gray-400 group-hover:text-primary{% endif %} transition-colors w-5 text-center text-[18px]"></i>
          <span class="text-[15px]">New Applicant</span>
        </a>
        
        <a href="{{ url_for('existing_applicant') }}" class="flex items-center gap-3.5 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.endpoint == 'existing_applicant' %}bg-primary/10 text-primary font-semibold{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
          <i class="fas fa-users {% if request.endpoint == 'existing_applicant' %}text-primary{% else %}text-gray-400 group-hover:text-primary{% endif %} transition-colors w-5 text-center text-[18px]"></i>
          <span class="text-[15px]">Existing Applicants</span>
        </a>
        
        <a href="{{ url_for('analytics') }}" class="flex items-center gap-3.5 px-4 py-3 rounded-xl transition-all duration-200 group {% if request.endpoint == 'analytics' %}bg-primary/10 text-primary font-semibold{% else %}text-gray-500 hover:bg-gray-50 hover:text-gray-900{% endif %}">
          <i class="fas fa-chart-line {% if request.endpoint == 'analytics' %}text-primary{% else %}text-gray-400 group-hover:text-primary{% endif %} transition-colors w-5 text-center text-[18px]"></i>
          <span class="text-[15px]">Analytics</span>
        </a>
      </nav>
    </div>

    <div class="px-5 p-6 border-t border-gray-50">
      <a href="{{ url_for('logout') }}" class="flex items-center gap-3.5 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-all duration-200 font-medium group">
        <i class="fas fa-sign-out-alt w-5 text-center text-[18px] group-hover:scale-110 transition-transform"></i>
        <span class="text-[15px]">Logout Session</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 h-full overflow-y-auto no-scrollbar relative md:pb-0 pb-28">
    <div class="max-w-[1200px] mx-auto w-full">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<!-- Mobile Bottom Navigation (Hidden on >= md) -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 px-6 py-3 pb-safe z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] flex justify-between items-center rounded-t-3xl border-x-4 border-b-4 border-transparent">
  <a href="{{ url_for('dashboard') }}" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-colors {% if request.endpoint == 'dashboard' %}text-primary{% else %}text-gray-400 hover:text-gray-900{% endif %}">
    <i class="fas fa-th-large text-[20px]"></i>
    <span class="text-[10px] font-semibold mt-0.5">Home</span>
  </a>
  <a href="{{ url_for('existing_applicant') }}" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-colors {% if request.endpoint == 'existing_applicant' %}text-primary{% else %}text-gray-400 hover:text-gray-900{% endif %}">
    <i class="fas fa-users text-[20px]"></i>
    <span class="text-[10px] font-semibold mt-0.5">Records</span>
  </a>
  
  <div class="relative -top-6">
    <a href="{{ url_for('new_applicant') }}" class="w-[60px] h-[60px] rounded-[20px] bg-gradient-to-tr from-primary to-primary-light flex items-center justify-center text-white shadow-floating transform transition-transform box-border border-[6px] border-[#F8F9FC] active:scale-95 text-2xl rotate-45">
      <i class="fas fa-plus -rotate-45 {% if request.endpoint == 'new_applicant' or request.endpoint == 'edit_applicant' %}animate-pulse{% endif %}"></i>
    </a>
  </div>
  
  <a href="{{ url_for('analytics') }}" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-colors {% if request.endpoint == 'analytics' %}text-primary{% else %}text-gray-400 hover:text-gray-900{% endif %}">
    <i class="fas fa-chart-pie text-[20px]"></i>
    <span class="text-[10px] font-semibold mt-0.5">Stats</span>
  </a>
  <a href="{{ url_for('logout') }}" class="flex flex-col items-center gap-1 p-2 rounded-xl transition-colors text-gray-400 hover:text-red-500">
    <i class="fas fa-power-off text-[20px]"></i>
    <span class="text-[10px] font-semibold mt-0.5">Exit</span>
  </a>
</nav>

<!-- Global Toast -->
<div class="toast" id="globalToast">
  <i class="fas fa-info-circle text-[24px]" id="toastIcon"></i>
  <div>
    <h4 class="font-bold text-gray-900 text-[14px]" id="toastTitle">Notification</h4>
    <p class="text-[13px] text-gray-500 mt-0.5" id="toastMsg">Message goes here</p>
  </div>
</div>

<script>
  window.showToast = function(msg, isError=false) {
    const t = document.getElementById('globalToast');
    const msgEl = document.getElementById('toastMsg');
    const icon = document.getElementById('toastIcon');
    const title = document.getElementById('toastTitle');
    
    msgEl.textContent = msg;
    t.classList.remove('error');
    if (isError) {
      t.classList.add('error');
      icon.className = 'fas fa-exclamation-circle text-[24px] text-red-500';
      title.textContent = 'Action Failed';
    } else {
      icon.className = 'fas fa-check-circle text-[24px] text-emerald-500';
      title.textContent = 'Success';
    }
    
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>

{% block scripts %}{% endblock %}

</body>
</html>

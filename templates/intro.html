{% extends 'auth_base.html' %}
{% block title %}Welcome - Admission Portal{% endblock %}

{% block content %}
<div class="w-full flex flex-col items-center justify-center text-center">
    <div class="w-24 h-24 mx-auto bg-white/20 backdrop-blur-md rounded-[28px] flex items-center justify-center text-white text-5xl mb-8 border border-white/20 shadow-xl">
      <i class="fas fa-graduation-cap"></i>
    </div>
    
    <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">SSEC Admission Portal System</h1>
    <p class="text-white/80 font-medium mb-12 text-base md:text-lg">Streamlined college admission management for staff</p>
    
    <a href="{{ url_for('login') }}" class="inline-flex items-center justify-center gap-3 px-8 py-3.5 bg-white text-[#7B66D9] font-bold rounded-full hover:bg-gray-50 transition-all active:scale-95 shadow-lg">
      <span class="text-sm">Get Started</span>
      <i class="fas fa-arrow-right text-xs"></i>
    </a>
</div>
{% endblock %}
